<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>运营仪表盘</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        oklch(98.5% 0.003 120);
    --bg-card:   oklch(99.2% 0.002 120);
    --bg-sunken: oklch(97.2% 0.004 130);
    --ink:       oklch(22% 0.018 165);
    --ink-soft:  oklch(35% 0.014 165);
    --mute:      oklch(55% 0.012 160);
    --faint:     oklch(72% 0.008 160);
    --brand:     oklch(38% 0.09 168);
    --brand-2:   oklch(52% 0.07 165);
    --brand-tint:oklch(95% 0.03 168);
    --hair:      oklch(90% 0.006 150);
    --hair-strong: oklch(84% 0.008 150);
    --amber:     oklch(70% 0.13 70);
    --amber-tint:oklch(94% 0.04 75);
    --blue:      oklch(55% 0.09 245);
    --blue-tint: oklch(94% 0.03 245);
    --rose:      oklch(62% 0.12 20);
    --rose-tint: oklch(95% 0.025 20);
    --danger:    oklch(56% 0.18 27);
    --danger-tint: oklch(96% 0.04 27);
    --shadow-sm: 0 1px 2px oklch(20% 0.02 160 / 0.04);
    --shadow-md: 0 1px 3px oklch(20% 0.02 160 / 0.05), 0 4px 12px oklch(20% 0.02 160 / 0.04);
    --r-sm:6px; --r-md:10px; --r-lg:14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--ink);
    font-family: 'Space Grotesk', -apple-system, "PingFang SC", sans-serif;
    font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body { min-height: 100vh; background-image:
      radial-gradient(circle at 0% 0%, oklch(96% 0.04 168 / 0.5) 0%, transparent 35%),
      radial-gradient(circle at 100% 0%, oklch(96% 0.03 90 / 0.35) 0%, transparent 30%);
      background-attachment: fixed; }
  ::selection { background: var(--brand-tint); color: var(--brand); }
  .serif { font-family: 'Fraunces', Georgia, serif; }

  /* TOPBAR */
  .topbar { position: sticky; top: 0; z-index: 50;
    background: oklch(98.5% 0.003 120 / 0.82); backdrop-filter: saturate(180%) blur(14px);
    border-bottom: 1px solid var(--hair); }
  .topbar-inner { max-width: 1440px; margin: 0 auto; display: flex; align-items: center; gap: 24px; padding: 14px 32px; }
  .brand-mark { display: flex; align-items: center; gap: 10px; font-family: 'Fraunces', serif; font-weight: 600; font-size: 17px; letter-spacing: -0.01em; }
  .brand-logo { width: 28px; height: 28px; border-radius: 7px; background: var(--brand);
    background-image: linear-gradient(140deg, oklch(44% 0.1 170) 0%, oklch(32% 0.08 165) 100%);
    box-shadow: inset 0 1px 0 oklch(100% 0 0 / 0.2), 0 2px 6px oklch(30% 0.08 165 / 0.3);
    display: grid; place-items: center; flex-shrink: 0; }
  .brand-logo svg { width: 15px; height: 15px; }
  .tabs { display: flex; align-items: center; gap: 2px; margin-left: 4px; }
  .tab { appearance: none; background: none; border: none; font-family: inherit; font-size: 13.5px; font-weight: 500;
    color: var(--mute); padding: 8px 13px; border-radius: 8px; cursor: pointer; transition: color .15s, background .15s;
    display: flex; align-items: center; gap: 7px; }
  .tab:hover { color: var(--ink); background: var(--bg-sunken); }
  .tab.active { color: var(--ink); background: oklch(100% 0 0 / 0.9); box-shadow: var(--shadow-sm), inset 0 0 0 1px var(--hair); }
  .tab .count { font-size: 11px; font-weight: 600; background: var(--bg-sunken); color: var(--mute); padding: 1px 6px; border-radius: 99px; min-width: 16px; text-align: center; }
  .tab.active .count { background: var(--brand-tint); color: var(--brand); }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .btn { appearance: none; border: 1px solid var(--hair); background: var(--bg-card); font-family: inherit; font-size: 13px; font-weight: 500;
    color: var(--ink-soft); padding: 8px 14px; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all .15s; }
  .btn:hover { border-color: var(--hair-strong); box-shadow: var(--shadow-sm); }
  .btn.primary { background: var(--brand); border-color: var(--brand); color: oklch(99% 0.01 168);
    box-shadow: 0 1px 2px oklch(28% 0.08 165 / 0.25), inset 0 1px 0 oklch(100% 0 0 / 0.18); }
  .btn.primary:hover { background: oklch(34% 0.085 168); }
  .btn.sm { padding: 4px 10px; font-size: 12px; border-radius: 7px; }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--mute); }
  .btn.ghost:hover { background: var(--bg-sunken); color: var(--ink); border-color: var(--hair); }
  .btn.danger { color: var(--danger); }
  .btn.danger:hover { background: var(--danger-tint); border-color: oklch(80% 0.06 27); color: var(--danger); }

  /* MAIN */
  main { max-width: 1440px; margin: 0 auto; padding: 28px 32px 80px; }
  .page-head { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-bottom: 22px; }
  .page-title { font-family: 'Fraunces', serif; font-weight: 500; font-size: 28px; letter-spacing: -0.02em; line-height: 1.1; }
  .page-title em { font-style: italic; color: var(--brand); font-weight: 400; }
  .sync-tag { font-size: 12px; color: var(--faint); display: flex; align-items: center; gap: 6px; }
  .sync-tag::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--brand-2); }

  /* KANBAN */
  .kanban-scroll { overflow-x: auto; margin: 0 -32px; padding: 0 32px 8px; }
  .kanban { display: grid; grid-template-columns: repeat(5, minmax(248px, 1fr)); gap: 14px; min-width: 1290px; }
  .col-head { display: flex; align-items: center; gap: 8px; padding: 4px 4px 12px; }
  .col-dot { width: 7px; height: 7px; border-radius: 50%; }
  .col[data-stage="pool"] .col-dot { background: var(--amber); }
  .col[data-stage="draft"] .col-dot { background: var(--blue); }
  .col[data-stage="review"] .col-dot { background: var(--brand); }
  .col[data-stage="voice"] .col-dot { background: oklch(60% 0.14 310); }
  .col[data-stage="publish"] .col-dot { background: var(--brand-2); }
  .col-title { font-size: 13px; font-weight: 600; }
  .col-count { font-size: 11px; font-weight: 600; color: var(--mute); background: var(--bg-sunken); padding: 1px 7px; border-radius: 99px; }
  .col-body { display: flex; flex-direction: column; gap: 9px; }

  .card { background: var(--bg-card); border: 1px solid var(--hair); border-radius: var(--r-md); padding: 12px 13px;
    box-shadow: var(--shadow-sm); transition: box-shadow .18s, transform .18s, border-color .18s; }
  .card:hover { box-shadow: var(--shadow-md); border-color: var(--hair-strong); transform: translateY(-1px); }
  .card-top { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .badge-form { font-size: 10.5px; font-weight: 600; padding: 2px 7px; border-radius: 5px; border: 1px solid var(--hair); color: var(--ink-soft); background: var(--bg-card); }
  .badge-form.video { background: var(--rose-tint); border-color: oklch(88% 0.04 20); color: oklch(45% 0.1 20); }
  .badge-form.article { background: var(--blue-tint); border-color: oklch(88% 0.03 245); color: oklch(42% 0.08 245); }
  .card-id { font-size: 10.5px; color: var(--faint); font-variant-numeric: tabular-nums; margin-left: auto; }
  .card-title { font-size: 13.5px; font-weight: 600; line-height: 1.35; letter-spacing: -0.01em; }
  .card-meta { font-size: 11.5px; color: var(--mute); margin-top: 3px; }
  .card-foot { display: flex; align-items: center; gap: 6px; margin-top: 10px; padding-top: 9px; border-top: 1px solid var(--hair); flex-wrap: wrap; }
  .status-tag { font-size: 10.5px; font-weight: 600; padding: 2px 7px; border-radius: 5px; display: inline-flex; align-items: center; gap: 4px; }
  .status-tag::before { content: ""; width: 5px; height: 5px; border-radius: 50%; }
  .st-pending { background: var(--amber-tint); color: oklch(42% 0.1 65); } .st-pending::before { background: var(--amber); }
  .st-doing { background: var(--brand-tint); color: var(--brand); } .st-doing::before { background: var(--brand); }
  .st-done { background: oklch(94% 0.02 150); color: oklch(40% 0.06 155); } .st-done::before { background: oklch(55% 0.08 155); }

  .ghost-card { border: 1px dashed var(--hair-strong); background: transparent; box-shadow: none; color: var(--faint);
    text-align: center; padding: 14px; font-size: 12.5px; font-weight: 500; cursor: pointer; border-radius: var(--r-md); transition: all .15s; }
  .ghost-card:hover { border-color: var(--brand-2); color: var(--brand); background: var(--brand-tint); }

  /* FORM (inline) */
  .form { display: flex; flex-direction: column; gap: 7px; }
  .form input, .form select { font-family: inherit; font-size: 13px; padding: 7px 10px; border: 1px solid var(--hair-strong); border-radius: 7px; outline: none; width: 100%; background: var(--bg); color: var(--ink); }
  .form input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px oklch(38% 0.09 168 / 0.13); }
  .form .row { display: flex; gap: 6px; }
  .form .row .btn { flex: 0 0 auto; }

  /* PANEL / TABLE */
  .panel { background: var(--bg-card); border: 1px solid var(--hair); border-radius: var(--r-lg); box-shadow: var(--shadow-sm); overflow: hidden; }
  .panel + .panel { margin-top: 16px; }
  .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--hair); }
  .panel-title { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 500; letter-spacing: -0.015em; }
  .panel-tools { display: flex; gap: 8px; }
  table { width: 100%; border-collapse: collapse; }
  thead th { text-align: left; font-size: 11px; font-weight: 600; color: var(--mute); letter-spacing: 0.04em; text-transform: uppercase; padding: 10px 20px; background: var(--bg-sunken); border-bottom: 1px solid var(--hair); }
  tbody td { padding: 13px 20px; border-bottom: 1px solid var(--hair); font-size: 13.5px; color: var(--ink-soft); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background .12s; }
  tbody tr:hover { background: var(--bg-sunken); }
  tbody tr.editing { background: var(--brand-tint); }
  .t-name { font-weight: 600; color: var(--ink); }
  .t-link { color: var(--brand); text-decoration: none; font-size: 12.5px; }
  .t-link:hover { text-decoration: underline; text-underline-offset: 2px; }
  .empty-cell { color: var(--faint); }
  .chip { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 99px; }
  .chip::before { content:""; width:5px; height:5px; border-radius:50%; }
  .chip-live { background: var(--brand-tint); color: var(--brand); } .chip-live::before { background: var(--brand); }
  .chip-build { background: var(--amber-tint); color: oklch(42% 0.1 65); } .chip-build::before { background: var(--amber); }
  .chip-idea { background: oklch(94% 0.02 150); color: oklch(40% 0.06 155); } .chip-idea::before { background: oklch(55% 0.08 155); }
  .row-acts { display: flex; gap: 4px; justify-content: flex-end; }
  td input, td select { font-family: inherit; font-size: 13px; padding: 5px 8px; border: 1px solid var(--hair-strong); border-radius: 6px; outline: none; width: 100%; background: var(--bg); }
  td input:focus { border-color: var(--brand); }

  .empty-state { text-align: center; padding: 48px 20px; color: var(--faint); }
  .empty-state .em { font-family: 'Fraunces', serif; font-size: 18px; color: var(--mute); margin-bottom: 4px; }

  .view { display: none; }
  .view.active { display: block; animation: fade .2s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand-mark">
      <div class="brand-logo"><svg viewBox="0 0 16 16" fill="none"><path d="M3 11.5 L7 5 L9.5 8.5 L13 4" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="13" cy="4" r="1.4" fill="white"/></svg></div>
      运营仪表盘
    </div>
    <nav class="tabs">
      <button class="tab active" data-view="pipeline">选题 <span class="count" id="c-pipe">0</span></button>
      <button class="tab" data-view="products">产品 <span class="count" id="c-prod">0</span></button>
      <button class="tab" data-view="accounts">账号 <span class="count" id="c-acc">0</span></button>
      <button class="tab" data-view="data">数据</button>
    </nav>
    <div class="topbar-right">
      <span class="sync-tag" id="sync">读取 _首页.md</span>
      <button class="btn ghost sm" onclick="loadAll()" title="重新读取">↻ 刷新</button>
    </div>
  </div>
</header>

<main>

  <!-- 选题 -->
  <section class="view active" id="view-pipeline">
    <div class="page-head">
      <h1 class="page-title">选题 <em>流水线</em></h1>
      <button class="btn primary sm" onclick="pipeCreate()">+ 新选题</button>
    </div>
    <div class="kanban-scroll"><div class="kanban" id="kanban"></div></div>
  </section>

  <!-- 产品 -->
  <section class="view" id="view-products">
    <div class="page-head">
      <h1 class="page-title">我的 <em>产品</em></h1>
      <button class="btn primary sm" onclick="prodCreate()">+ 新产品</button>
    </div>
    <div class="panel">
      <div class="panel-head"><div class="panel-title">产品清单</div></div>
      <table id="prod-table">
        <thead><tr><th>产品</th><th>形态</th><th>状态</th><th>访问地址</th><th>获客渠道</th><th style="text-align:right">操作</th></tr></thead>
        <tbody id="prod-body"></tbody>
      </table>
    </div>
  </section>

  <!-- 账号 -->
  <section class="view" id="view-accounts">
    <div class="page-head">
      <h1 class="page-title">全平台 <em>账号</em></h1>
      <button class="btn primary sm" onclick="accCreate()">+ 新账号</button>
    </div>
    <div class="panel">
      <div class="panel-head"><div class="panel-title">账号清单</div></div>
      <table id="acc-table">
        <thead><tr><th>平台</th><th>账号</th><th>入口</th><th>用途</th><th style="text-align:right">操作</th></tr></thead>
        <tbody id="acc-body"></tbody>
      </table>
    </div>
  </section>

  <!-- 数据 -->
  <section class="view" id="view-data">
    <div class="page-head">
      <h1 class="page-title">发布 <em>复盘</em></h1>
      <span class="sync-tag">读取 05/发布复盘.md · 发布后 24h / 48h / 7天</span>
    </div>
    <div id="data-area"></div>
  </section>

</main>

<script>
const COLS=[['POOL','选题池'],['WRITING','写稿'],['REVIEW','审核'],['VOICE','配音'],['PUBLISH','发布']];
const NEXT={POOL:'开始写稿 →',WRITING:'送审核 →',REVIEW:'去配音 →',VOICE:'去发布 →',PUBLISH:'标记已发布 ✓'};
const SNAME={POOL:'选题池',WRITING:'写稿中',REVIEW:'待审核',VOICE:'待配音',PUBLISH:'待发布',DONE:'已发布'};
function colOf(s){return s==='DONE'?'PUBLISH':s;}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function strip(t){return (t||'')
  .replace(/\[\[([^[\]]*?)\\?\|([^[\]]*?)\]\]/g,'$2')
  .replace(/\[\[([^[\]]+?)\]\]/g,'$1')
  .replace(/\[([^\]]+)\]\(([^)]*)\)/g,'$1')
  .trim();}

let D={pipeline:[],product:[],account:[],data:{xhs:[],wx:[],zh:[],bili:[]}};
let UI={tab:'pipeline', pipeEditing:null, pipeCreating:false, prodEditing:null, prodCreating:false, accEditing:null, accCreating:false};

async function api(path, body){
  const r=await fetch('/api/'+path,{method:body?'POST':'GET',headers:body?{'Content-Type':'application/json'}:{},body:body?JSON.stringify(body):undefined});
  const j=await r.json(); if(!j.ok) throw new Error(j.error); return j;
}
async function loadAll(){
  try{
    const [p,pr,ac,da]=await Promise.all([api('pipeline'),api('product'),api('account'),api('data')]);
    D.pipeline=p.items||[]; D.product=pr.items||[]; D.account=ac.items||[]; D.data=da;
    document.getElementById('sync').textContent='已同步 _首页.md · '+new Date().toLocaleTimeString('zh-CN',{hour12:false});
  }catch(e){ document.getElementById('sync').textContent='读取失败：'+e.message; return; }
  render();
}
function render(){
  document.getElementById('c-pipe').textContent=D.pipeline.length;
  document.getElementById('c-prod').textContent=D.product.length;
  document.getElementById('c-acc').textContent=D.account.length;
  renderPipe(); renderProd(); renderAcc(); renderData();
}

// ===== 选题 =====
function renderPipe(){
  const kb=document.getElementById('kanban'); kb.innerHTML='';
  COLS.forEach(([key,label])=>{
    const inCol=D.pipeline.filter(it=>colOf(it.stage)===key);
    const col=document.createElement('div'); col.className='col'; col.dataset.stage={POOL:'pool',WRITING:'draft',REVIEW:'review',VOICE:'voice',PUBLISH:'publish'}[key];
    const h=document.createElement('div'); h.className='col-head';
    h.innerHTML=`<span class="col-dot"></span><span class="col-title">${label}</span><span class="col-count">${inCol.length}</span>`;
    const body=document.createElement('div'); body.className='col-body';
    if(key==='POOL'&&UI.pipeCreating) body.appendChild(pipeForm(null));
    inCol.forEach(it=>{
      if(UI.pipeEditing===it.id) body.appendChild(pipeForm(it));
      else body.appendChild(pipeCard(it));
    });
    col.appendChild(h); col.appendChild(body); kb.appendChild(col);
  });
}
function pipeCard(it){
  const c=document.createElement('div'); c.className='card';
  const formCls = it.form==='视频'?'video':(it.form==='文章'?'article':'');
  const stag = it.stage==='DONE'?'st-done':(it.stage==='POOL'?'st-pending':'st-doing');
  c.innerHTML = `
    <div class="card-top">${it.form?`<span class="badge-form ${formCls}">${esc(it.form)}</span>`:''}<span class="card-id">#${esc(it.id)}</span></div>
    <div class="card-title">${esc(strip(it.title))}</div>
    ${it.next?`<div class="card-meta">下一步：${esc(it.next)}</div>`:''}
    <div class="card-foot">
      <span class="status-tag ${stag}">${SNAME[it.stage]}</span>
      <span class="row-acts" style="margin-left:auto"></span>
    </div>`;
  const acts=c.querySelector('.row-acts');
  if(NEXT[it.stage]){ const b=mk('button','btn primary sm',NEXT[it.stage]); b.onclick=()=>pipeAdv(it.id,1); acts.appendChild(b); }
  if(it.stage!=='POOL'){ const b=mk('button','btn ghost sm','←'); b.title='退回'; b.onclick=()=>pipeAdv(it.id,-1); acts.appendChild(b); }
  const ed=mk('button','btn ghost sm','编辑'); ed.onclick=()=>{UI.pipeEditing=it.id;UI.pipeCreating=false;renderPipe();}; acts.appendChild(ed);
  const dl=mk('button','btn ghost sm danger','删除'); dl.onclick=()=>{ if(confirm('删除「'+strip(it.title)+'」？')) pipeDel(it.id); }; acts.appendChild(dl);
  return c;
}
function pipeForm(it){
  const c=document.createElement('div'); c.className='card';
  const f=document.createElement('form'); f.className='form';
  f.innerHTML=`
    <input name="title" placeholder="选题名（必填）" value="${it?esc(strip(it.title)):''}" autofocus>
    <input name="form" placeholder="形式：文章 / 视频 / 待定" value="${it?esc(it.form):''}">
    <input name="next" placeholder="下一步：备选 / …" value="${it?esc(it.next):''}">
    <div class="row"><button class="btn primary sm" type="submit">💾 ${it?'保存':'加入选题池'}</button><button class="btn sm" type="button" onclick="UI.pipeEditing=null;UI.pipeCreating=false;renderPipe();">取消</button></div>`;
  f.onsubmit=async(e)=>{ e.preventDefault(); const title=f.title.value.trim(); if(!title){f.title.focus();return;}
    const body={title,form:f.form.value.trim(),next:f.next.value.trim()};
    try{ if(it) await api('pipeline/update',{id:it.id,...body}); else await api('pipeline/create',body);
      UI.pipeEditing=null; UI.pipeCreating=false; await loadAll();
    }catch(err){alert(err.message);} };
  c.appendChild(f); return c;
}
async function pipeAdv(id,dir){ try{ await api('pipeline/advance',{id,dir}); await loadAll(); }catch(e){alert(e.message);} }
async function pipeDel(id){ try{ await api('pipeline/delete',{id}); await loadAll(); }catch(e){alert(e.message);} }
function pipeCreate(){ UI.pipeCreating=true; UI.pipeEditing=null; renderPipe(); }

// ===== 产品 =====
const PROD_FIELDS=[['产品','产品名（必填）'],['产品形态','web / 小程序 / …'],['状态','已上线 / 构建中 / 构想'],['访问地址','https://…'],['获客渠道','小红书 / SEO / …']];
function renderProd(){
  const tb=document.getElementById('prod-body'); tb.innerHTML='';
  if(UI.prodCreating) tb.appendChild(editRow('prod', null));
  if(D.product.length===0 && !UI.prodCreating){ const tr=mk('tr'); tr.innerHTML='<td colspan="6"><div class="empty-state"><div class="em">还没有产品</div>点右上「+ 新产品」添加</div></td>'; tb.appendChild(tr); return; }
  D.product.forEach(it=>{
    if(UI.prodEditing===it.key) tb.appendChild(editRow('prod', it));
    else tb.appendChild(prodRow(it));
  });
}
function statusChip(s){
  const t=esc(s||'');
  if(/上线|已上线/.test(t)) return `<span class="chip chip-live">${t||'已上线'}</span>`;
  if(/构建|开发|内测/.test(t)) return `<span class="chip chip-build">${t||'构建中'}</span>`;
  if(t) return `<span class="chip chip-idea">${t}</span>`;
  return `<span class="empty-cell">—</span>`;
}
function prodRow(it){
  const c=it.cells;
  const tr=mk('tr');
  tr.innerHTML=`<td class="t-name">${esc(c['产品'])}</td><td>${esc(c['产品形态']||'—')}</td><td>${statusChip(c['状态'])}</td>
    <td>${c['访问地址']?`<a class="t-link" href="#" onclick="return false">${esc(c['访问地址'])}</a>`:'<span class="empty-cell">—</span>'}</td>
    <td>${esc(c['获客渠道']||'—')}</td>
    <td><div class="row-acts"></div></td>`;
  const acts=tr.querySelector('.row-acts');
  const ed=mk('button','btn ghost sm','编辑'); ed.onclick=()=>{UI.prodEditing=it.key;UI.prodCreating=false;renderProd();}; acts.appendChild(ed);
  const dl=mk('button','btn ghost sm danger','删除'); dl.onclick=()=>{ if(confirm('删除产品「'+it.key+'」？')) prodDel(it.key); }; acts.appendChild(dl);
  return tr;
}
function editRow(kind, it){
  const fields = kind==='prod'?PROD_FIELDS:[['平台','平台（必填）'],['账号','账号名'],['入口','入口 / 后台'],['用途','用途']];
  const tr=mk('tr'); tr.className='editing';
  const inputs = fields.map(([col,ph])=>`<td><input name="${col}" placeholder="${ph}" value="${it?esc(it.cells[col]||''):''}"></td>`).join('');
  tr.innerHTML = inputs + `<td><div class="row-acts"><button class="btn primary sm" data-act="save">💾 保存</button><button class="btn sm" data-act="cancel">取消</button></div></td>`;
  tr.querySelector('[data-act=save]').onclick=async()=>{
    const body={}; fields.forEach(([col])=> body[col]=tr.querySelector(`[name=${col}]`).value.trim());
    try{
      if(kind==='prod'){
        const key = body['产品']; if(!key){alert('产品名必填');return;}
        if(it) await api('product/update',{key:it.key,fields:body}); else await api('product/create',body);
        UI.prodEditing=null; UI.prodCreating=false;
      } else {
        const key = body['平台']; if(!key){alert('平台必填');return;}
        if(!body['账号']){alert('账号必填');return;}
        if(it) await api('account/update',{key:it.key,fields:body}); else await api('account/create',body);
        UI.accEditing=null; UI.accCreating=false;
      }
      await loadAll();
    }catch(e){alert(e.message);}
  };
  tr.querySelector('[data-act=cancel]').onclick=()=>{ if(kind==='prod'){UI.prodEditing=null;UI.prodCreating=false;renderProd();} else {UI.accEditing=null;UI.accCreating=false;renderAcc();} };
  return tr;
}
async function prodDel(key){ try{ await api('product/delete',{key}); await loadAll(); }catch(e){alert(e.message);} }
function prodCreate(){ UI.prodCreating=true; UI.prodEditing=null; renderProd(); }

// ===== 账号 =====
function renderAcc(){
  const tb=document.getElementById('acc-body'); tb.innerHTML='';
  if(UI.accCreating) tb.appendChild(editRow('acc', null));
  if(D.account.length===0 && !UI.accCreating){ const tr=mk('tr'); tr.innerHTML='<td colspan="5"><div class="empty-state"><div class="em">还没有账号</div>点右上「+ 新账号」添加</div></td>'; tb.appendChild(tr); return; }
  D.account.forEach(it=>{
    if(UI.accEditing===it.key) tb.appendChild(editRow('acc', it));
    else tb.appendChild(accRow(it));
  });
}
function accRow(it){
  const c=it.cells;
  const label=[c['平台'],c['账号']].filter(Boolean).join(' / ');
  const tr=mk('tr');
  tr.innerHTML=`<td class="t-name">${esc(c['平台'])}</td><td>${esc(c['账号']||'—')}</td><td>${esc(c['入口']||'—')}</td><td>${esc(c['用途']||'—')}</td><td><div class="row-acts"></div></td>`;
  const acts=tr.querySelector('.row-acts');
  const ed=mk('button','btn ghost sm','编辑'); ed.onclick=()=>{UI.accEditing=it.key;UI.accCreating=false;renderAcc();}; acts.appendChild(ed);
  const dl=mk('button','btn ghost sm danger','删除'); dl.onclick=()=>{ if(confirm('删除「'+label+'」？')) accDel(it.key); }; acts.appendChild(dl);
  return tr;
}
async function accDel(key){ try{ await api('account/delete',{key}); await loadAll(); }catch(e){alert(e.message);} }
function accCreate(){ UI.accCreating=true; UI.accEditing=null; renderAcc(); }

// ===== 数据 =====
function renderData(){
  const area=document.getElementById('data-area');
  const groups=[['xhs','小红书'],['wx','公众号'],['zh','知乎'],['bili','B站']];
  const total = groups.reduce((n,[k])=>n+((D.data[k]||[]).length),0);
  if(total===0){ area.innerHTML=`<div class="empty-state"><div class="em">还没有发布数据</div>发出去的内容，数据会在这里自动汇总（赞藏评 / 阅读 / 播放）</div>`; return; }
  area.innerHTML = groups.map(([k,name])=>{
    const rows=D.data[k]||[];
    if(rows.length===0) return '';
    const cols=Object.keys(rows[0].cells);
    const head=cols.map(c=>`<th>${esc(c)}</th>`).join('');
    const body=rows.map(r=>`<tr>${cols.map(c=>`<td>${esc(r.cells[c]||'—')}</td>`).join('')}</tr>`).join('');
    return `<div class="panel"><div class="panel-head"><div class="panel-title">${name} <span style="color:var(--faint);font-size:13px;font-weight:400;margin-left:6px">${rows.length}</span></div></div><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
  }).join('');
}

// ===== 工具 =====
function mk(tag, cls, text){ const e=document.createElement(tag); if(cls) e.className=cls; if(text!=null) e.textContent=text; return e; }

// tab 切换
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('view-'+tab.dataset.view).classList.add('active');
    window.scrollTo({top:0,behavior:'smooth'});
  });
});

loadAll();
</script>
</body>
</html>
